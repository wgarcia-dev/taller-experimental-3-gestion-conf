name: CI

on:
  push:
    branches: ["main", "master", "ci-setup"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t taller-gestion-conf:ci .

      - name: Validate image with Django tests
        run: docker run --rm taller-gestion-conf:ci python manage.py test

      - name: Prepare Docker image artifact
        run: |
          mkdir -p docker-artifact
          docker save taller-gestion-conf:ci -o docker-artifact/taller-gestion-conf-ci.tar
          docker image inspect taller-gestion-conf:ci > docker-artifact/image-inspect.json

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: taller-gestion-conf-docker-image
          path: docker-artifact/
